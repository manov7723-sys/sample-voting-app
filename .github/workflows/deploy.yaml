name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::641628981128:role/eks-oidc-role
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name web-app

      - name: Deploy
        run: |
          kubectl apply -f k8s/

      - name: Verify rollout
        run: kubectl rollout status deployment --all -n dev